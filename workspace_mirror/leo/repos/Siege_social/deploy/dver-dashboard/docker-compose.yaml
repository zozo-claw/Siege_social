version: "3.9"

networks:
  internal:
    driver: bridge
  external_net:
    driver: bridge

services:
  dashboard-app:
    image: nginx:alpine
    container_name: dver-dashboard-app
    volumes:
      - ./app:/usr/share/nginx/html:ro
    networks:
      - internal
    restart: unless-stopped

  auth-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    container_name: dver-auth-proxy
    ports:
      - "4180:4180"
    environment:
      OAUTH2_PROXY_PROVIDER: github
      OAUTH2_PROXY_CLIENT_ID: "${OAUTH2_PROXY_CLIENT_ID}"
      OAUTH2_PROXY_CLIENT_SECRET: "${OAUTH2_PROXY_CLIENT_SECRET}"
      OAUTH2_PROXY_COOKIE_SECRET: "${OAUTH2_PROXY_COOKIE_SECRET}"
      OAUTH2_PROXY_GITHUB_USER: "zozo-claw"
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_UPSTREAMS: "http://dashboard-app:80"
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
      OAUTH2_PROXY_COOKIE_SECURE: "false"
      OAUTH2_PROXY_COOKIE_EXPIRE: "24h"
      OAUTH2_PROXY_COOKIE_HTTPONLY: "true"
      OAUTH2_PROXY_REDIRECT_URL: "http://13.51.201.80:4180/oauth2/callback"
      OAUTH2_PROXY_SCOPE: "user:email read:user"
    networks:
      - internal
      - external_net
    depends_on:
      - dashboard-app
    restart: unless-stopped
